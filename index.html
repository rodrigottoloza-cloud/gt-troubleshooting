<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G&T Aircraft Troubleshooting</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
margin: 0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #091923, #102c3a);
color: #eef6fb;
}

.container {
max-width: 1080px;
margin: 0 auto;
padding: 24px;
}

.header {
margin-bottom: 18px;
}

.header h1 {
margin: 0;
font-size: 30px;
}

.header p {
margin: 8px 0 0;
color: #b8d2df;
}

.card {
background: rgba(19, 47, 60, 0.96);
border: 1px solid rgba(255,255,255,0.08);
border-radius: 16px;
padding: 22px;
box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.section-title {
margin-top: 0;
margin-bottom: 14px;
font-size: 24px;
}

.subtle {
color: #b8d2df;
}

textarea, input[type="text"], input[type="file"] {
width: 100%;
padding: 14px;
border-radius: 10px;
border: none;
outline: none;
margin-top: 10px;
margin-bottom: 16px;
font-size: 15px;
}

textarea, input[type="text"] {
background: #eef6fb;
color: #102c3a;
}

input[type="file"] {
background: #173644;
color: #eef6fb;
}

textarea {
min-height: 140px;
resize: vertical;
}

.btn-row {
display: flex;
flex-wrap: wrap;
gap: 10px;
margin-top: 12px;
}

button {
background: #00a8e8;
color: white;
border: none;
border-radius: 10px;
padding: 12px 18px;
cursor: pointer;
font-size: 15px;
font-weight: 600;
}

button:hover {
background: #008ec4;
}

button.secondary {
background: #2d4d5c;
}

button.secondary:hover {
background: #3c6273;
}

button.danger {
background: #b3261e;
}

button.danger:hover {
background: #921f19;
}

.highlight {
color: #4ff0c8;
font-weight: 700;
}

.warning-box {
background: rgba(179, 38, 30, 0.15);
border: 1px solid rgba(255, 99, 99, 0.35);
border-radius: 12px;
padding: 16px;
margin: 14px 0;
}

.success-box {
background: rgba(34, 139, 34, 0.14);
border: 1px solid rgba(100, 255, 160, 0.25);
border-radius: 12px;
padding: 16px;
margin: 14px 0;
}

.info-box {
background: rgba(0, 168, 232, 0.12);
border: 1px solid rgba(0, 168, 232, 0.25);
border-radius: 12px;
padding: 16px;
margin: 14px 0;
}

.grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 16px;
}

.mini-card {
background: #173644;
border-radius: 12px;
padding: 14px;
}

ul {
padding-left: 20px;
}

.footer-note {
margin-top: 18px;
font-size: 13px;
color: #9fbcca;
}

.preview-box {
margin-top: 10px;
margin-bottom: 20px;
background: #102c3a;
border: 1px solid rgba(255,255,255,0.08);
border-radius: 12px;
padding: 12px;
}

.preview-box img {
max-width: 100%;
border-radius: 8px;
display: block;
margin-top: 10px;
}

.ocr-status {
margin-top: 10px;
color: #b8d2df;
font-size: 14px;
}

.small {
font-size: 13px;
color: #b8d2df;
}

@media (max-width: 768px) {
.grid {
grid-template-columns: 1fr;
}

.container {
padding: 14px;
}
}
</style>
</head>
<body>

<div class="container">
<div class="header">
<h1>G&T Aircraft Troubleshooting</h1>
<p>IA guiada por documentación técnica, lógica de sistema y doctrina de seguridad.</p>
</div>

<div id="app" class="card"></div>
</div>

<script>
let step = 0;

const state = {
faultText: "",
detectedSystem: "",
detectedATA: "",
clarifiedCondition: "",
opText: "",
wdmText: "",
signalType: "",
contactState: "",
logicSummary: "",
expectedMeasurement: "",
opImageUrl: "",
wdmImageUrl: "",
opFileName: "",
wdmFileName: "",
opOCRText: "",
wdmOCRText: ""
};

function detectSystem(text) {
const t = text.toLowerCase();

if (
t.includes("tren") || t.includes("gear") || t.includes("uplock") ||
t.includes("downlock") || t.includes("unsafe")
) {
return { system: "Landing Gear", ata: "ATA 32" };
}

if (
t.includes("bleed") || t.includes("presur") || t.includes("cabin") ||
t.includes("flow pack") || t.includes("outflow")
) {
return { system: "Bleed / Pressurization", ata: "ATA 21" };
}

if (
t.includes("flap") || t.includes("aileron") || t.includes("rudder") ||
t.includes("elevator") || t.includes("control surface")
) {
return { system: "Flight Controls", ata: "ATA 27" };
}

if (
t.includes("voltaje") || t.includes("voltage") || t.includes("bus") ||
t.includes("breaker") || t.includes("electrical") || t.includes("relay")
) {
return { system: "Electrical", ata: "ATA 24" };
}

return { system: "Sistema no identificado con certeza", ata: "ATA no identificado" };
}

function parseDocs(opText, wdmText) {
const combined = (opText + " " + wdmText).toLowerCase();

let signalType = "No determinado con certeza";
let contactState = "No determinado con certeza";
let logicSummary = "No fue posible definir la lógica del sistema con certeza suficiente.";
let expectedMeasurement = "No medir todavía. Falta certeza técnica.";

const hasGround =
combined.includes("ground path") ||
combined.includes("ground signal") ||
combined.includes("ground to") ||
combined.includes("completes the ground") ||
combined.includes("ground circuit") ||
combined.includes("tierra") ||
combined.includes("masa");

const hasVoltage =
combined.includes("28 vdc") ||
combined.includes("28vdc") ||
combined.includes("voltage") ||
combined.includes("energizes") ||
combined.includes("supplies voltage") ||
combined.includes("electrical power") ||
combined.includes("voltaje");

const hasNo =
combined.includes("normally open") ||
combined.includes(" n.o.") ||
combined.includes(" no ") ||
combined.includes("normalmente abierto");

const hasNc =
combined.includes("normally closed") ||
combined.includes(" n.c.") ||
combined.includes(" nc ") ||
combined.includes("normalmente cerrado");

const hasClose =
combined.includes("closes") ||
combined.includes("closed when") ||
combined.includes("close when") ||
combined.includes("cierra") ||
combined.includes("completes");

const hasOpen =
combined.includes("opens") ||
combined.includes("open when") ||
combined.includes("abre") ||
combined.includes("interrupts");

const hasContinuity =
combined.includes("continuity") ||
combined.includes("continuidad");

if (hasGround && !hasVoltage) {
signalType = "Tierra";
logicSummary = "La documentación sugiere que el circuito trabaja principalmente con una señal de tierra.";
expectedMeasurement = "Esperar continuidad a tierra o 0.0 ohm contra estructura, según la condición confirmada del sistema.";
}

if (hasVoltage && !hasGround) {
signalType = "Voltaje";
logicSummary = "La documentación sugiere que el circuito trabaja principalmente con presencia o remoción de voltaje.";
expectedMeasurement = "Esperar presencia o ausencia de voltaje según la condición confirmada del sistema.";
}

if (hasGround && hasVoltage) {
signalType = "Mixto o no concluyente";
logicSummary = "La documentación contiene referencias tanto a tierra como a voltaje. Se requiere revisar la ruta exacta y la condición del esquema.";
expectedMeasurement = "No emitir una medición definitiva sin revisar el punto exacto del circuito.";
}

if (hasNo && !hasNc) {
contactState = "NO / Normally Open / Normalmente abierto";
}

if (hasNc && !hasNo) {
contactState = "NC / Normally Closed / Normalmente cerrado";
}

if (hasNo && hasNc) {
contactState = "Existen componentes NO y NC; revisar cada elemento individualmente";
}

if (signalType !== "No determinado con certeza") {
let movement = "";
if (hasClose && !hasOpen) movement = "La documentación también sugiere que el componente cambia a estado cerrado cuando actúa.";
if (hasOpen && !hasClose) movement = "La documentación también sugiere que el componente cambia a estado abierto cuando actúa.";
if (hasContinuity) movement += " Se mencionan verificaciones por continuidad.";
logicSummary += " " + movement;
}

return {
signalType,
contactState,
logicSummary,
expectedMeasurement
};
}

function render() {
const app = document.getElementById("app");

if (step === 0) {
app.innerHTML = `
<h2 class="section-title">Describe la falla</h2>
<p class="subtle">Escribe el síntoma tal como lo diría un técnico en terreno.</p>
<textarea id="faultInput" placeholder="Ej: Luz de tren LH no enciende"></textarea>
<div class="btn-row">
<button onclick="goToInterpretation()">Continuar</button>
</div>
<p class="footer-note">G&T interpretará automáticamente el sistema y ATA probable. Si no hay suficiente claridad, te pedirá precisar la condición.</p>
`;
}

if (step === 1) {
app.innerHTML = `
<h2 class="section-title">Interpretación automática</h2>
<div class="grid">
<div class="mini-card">
<strong>Sistema detectado</strong>
<p>${state.detectedSystem}</p>
</div>
<div class="mini-card">
<strong>ATA probable</strong>
<p>${state.detectedATA}</p>
</div>
</div>

<div class="info-box">
<strong>Ahora necesito precisión.</strong>
<p>Una falla mal descrita no puede diagnosticarse de forma segura.</p>
</div>

<p><strong>¿En qué condición exacta ocurre la falla?</strong></p>
<input type="text" id="conditionInput" placeholder="Ej: Tren abajo y asegurado / en tierra / luz verde LH no enciende">

<div class="btn-row">
<button onclick="saveCondition()">Confirmar condición</button>
<button class="secondary" onclick="step=0; render()">Volver</button>
</div>
`;
}

if (step === 2) {
app.innerHTML = `
<h2 class="section-title">Chequeo rápido previo</h2>
<div class="warning-box">
<strong>Recuerda:</strong>
<p>Un gran porcentaje de las fallas no son realmente una falla del sistema. Primero elimina lo simple.</p>
</div>

<ul>
<li>Verifica si la ampolleta está quemada e intercámbiala por una que sí funcione.</li>
<li>Revisa el soquete, limpieza, contacto y corrosión.</li>
<li>Verifica el circuit breaker correspondiente.</li>
<li>Si aplica al procedimiento: pull CB / esperar / push CB.</li>
</ul>

<p><strong>¿La falla se solucionó después de este chequeo previo?</strong></p>

<div class="btn-row">
<button onclick="basicSolved()">Sí, se solucionó</button>
<button onclick="step=3; render()">No, la falla sigue presente</button>
</div>
`;
}

if (step === 3) {
app.innerHTML = `
<h2 class="section-title">Cargar lógica documental</h2>
<p class="subtle">Ahora puedes subir imágenes para OCR o pegar el texto manualmente.</p>

<label><strong>1. Principio de operación — imagen o captura</strong></label>
<input type="file" accept="image/*" onchange="handleImageUpload(event, 'op')">
<div id="opPreview" class="preview-box">
${state.opFileName ? `<div><strong>Archivo:</strong> ${state.opFileName}</div>` : '<div class="small">Todavía no has cargado una imagen.</div>'}
${state.opImageUrl ? `<img src="${state.opImageUrl}" alt="Principio de operación">` : ''}
<div id="opStatus" class="ocr-status"></div>
</div>

<div class="btn-row">
<button onclick="runOCR('op')">Extraer texto del principio de operación</button>
</div>

<label><strong>Texto del principio de operación</strong></label>
<textarea id="opInput" placeholder="Pega aquí el texto del principio de operación...">${escapeHtmlToTextarea(state.opText)}</textarea>

<label><strong>2. Diagrama / WDM — imagen o captura</strong></label>
<input type="file" accept="image/*" onchange="handleImageUpload(event, 'wdm')">
<div id="wdmPreview" class="preview-box">
${state.wdmFileName ? `<div><strong>Archivo:</strong> ${state.wdmFileName}</div>` : '<div class="small">Todavía no has cargado una imagen.</div>'}
${state.wdmImageUrl ? `<img src="${state.wdmImageUrl}" alt="WDM o ruta eléctrica">` : ''}
<div id="wdmStatus" class="ocr-status"></div>
</div>

<div class="btn-row">
<button onclick="runOCR('wdm')">Extraer texto del WDM</button>
</div>

<label><strong>Texto relevante del WDM o ruta eléctrica</strong></label>
<textarea id="wdmInput" placeholder="Pega aquí la información clave del wiring diagram o descripción de la ruta...">${escapeHtmlToTextarea(state.wdmText)}</textarea>

<div class="warning-box">
<strong>WARNING</strong>
<p>La documentación debe corresponder al modelo, número de serie y configuración instalada de la aeronave. G&T no reemplaza el manual.</p>
<p class="small">Este OCR funciona mejor con capturas limpias, horizontales y de alto contraste. En diagramas densos, revisa y corrige el texto extraído antes de analizar.</p>
</div>

<div class="btn-row">
<button onclick="analyzeDocs()">Analizar documentación</button>
<button class="secondary" onclick="step=2; render()">Volver</button>
</div>
`;
}

if (step === 4) {
app.innerHTML = `
<h2 class="section-title">Interpretación técnica G&T</h2>

<div class="grid">
<div class="mini-card">
<strong>Sistema</strong>
<p>${state.detectedSystem}</p>
</div>
<div class="mini-card">
<strong>Condición reportada</strong>
<p>${state.clarifiedCondition}</p>
</div>
<div class="mini-card">
<strong>Tipo de señal detectada</strong>
<p>${state.signalType}</p>
</div>
<div class="mini-card">
<strong>Estado de contacto detectado</strong>
<p>${state.contactState}</p>
</div>
</div>

<div class="info-box">
<strong>Interpretación funcional</strong>
<p>${state.logicSummary}</p>
</div>

<div class="success-box">
<strong>Qué deberías esperar antes de medir</strong>
<p class="highlight">${state.expectedMeasurement}</p>
</div>

<div class="btn-row">
<button onclick="step=5; render()">Continuar</button>
<button class="secondary" onclick="step=3; render()">Revisar texto cargado</button>
</div>
`;
}

if (step === 5) {
app.innerHTML = `
<h2 class="section-title">Seguridad y validación mecánica</h2>

<div class="warning-box">
<strong>Antes de continuar:</strong>
<ul>
<li>Aeronave en condición segura</li>
<li>Energía controlada</li>
<li>Nadie debe accionar el sistema durante la inspección</li>
</ul>
</div>

<p><strong>¿El switch / relay / válvula / componente generador de señal está siendo accionado correctamente?</strong></p>

<div class="btn-row">
<button onclick="step=6; render()">Sí</button>
<button class="danger" onclick="mechanicalStop()">No</button>
</div>
`;
}

if (step === 6) {
app.innerHTML = `
<h2 class="section-title">Medición guiada</h2>

<div class="info-box">
<strong>Doctrina G&T</strong>
<p>No mides para descubrir. Mides para confirmar lo que la lógica documental indica que debería existir.</p>
</div>

<p><strong>Instrucción general de esta fase MVP:</strong></p>
<ul>
<li>Dirígete al componente que genera la señal.</li>
<li>Usa el WDM para identificar conector y pin exactos.</li>
<li>Realiza la medición correspondiente según el estado esperado definido arriba.</li>
</ul>

<div class="success-box">
<strong>Estado esperado</strong>
<p class="highlight">${state.expectedMeasurement}</p>
</div>

<p><strong>¿La medición cumple con el estado esperado?</strong></p>

<div class="btn-row">
<button onclick="measurementPass()">Sí, cumple</button>
<button class="danger" onclick="measurementFail()">No, no cumple</button>
</div>
`;
}

if (step === 7) {
app.innerHTML = `
<h2 class="section-title">Resultado provisional</h2>

<div class="success-box">
<strong>Conclusión</strong>
<p>La señal en el origen parece correcta. El siguiente paso es seguir la señal aguas abajo: conectores intermedios, cableado y entrada al panel o componente destino.</p>
</div>

<ul>
<li>Verifica el siguiente punto del circuito</li>
<li>Confirma que el mismo estado esperado siga presente</li>
<li>Si la señal se pierde entre dos puntos, ahí está acotada la falla</li>
</ul>

<div class="btn-row">
<button onclick="restartApp()">Nuevo caso</button>
</div>
`;
}

if (step === 8) {
app.innerHTML = `
<h2 class="section-title">Falla acotada en origen</h2>

<div class="warning-box">
<strong>Conclusión provisional</strong>
<p>La medición no coincide con el estado esperado. La señal no se está generando correctamente en el origen o la lógica base no ha sido confirmada por completo.</p>
</div>

<ul>
<li>Verifica actuación real del componente</li>
<li>Confirma condición del diagrama</li>
<li>Revisa si el contacto es NO o NC en esa condición</li>
<li>Valida ajuste, rigging o condición mecánica si aplica</li>
</ul>

<div class="btn-row">
<button onclick="restartApp()">Nuevo caso</button>
</div>
`;
}
}

function escapeHtmlToTextarea(text) {
return (text || "")
.replace(/&/g, "&amp;")
.replace(/</g, "&lt;")
.replace(/>/g, "&gt;");
}

function goToInterpretation() {
const value = document.getElementById("faultInput").value.trim();
if (!value) {
alert("Escribe una falla antes de continuar.");
return;
}

state.faultText = value;
const detection = detectSystem(value);
state.detectedSystem = detection.system;
state.detectedATA = detection.ata;
step = 1;
render();
}

function saveCondition() {
const value = document.getElementById("conditionInput").value.trim();
if (!value) {
alert("Debes definir la condición exacta de la falla.");
return;
}

state.clarifiedCondition = value;
step = 2;
render();
}

function basicSolved() {
const app = document.getElementById("app");
app.innerHTML = `
<h2 class="section-title">Falla resuelta en chequeo previo</h2>
<div class="success-box">
<strong>Resultado</strong>
<p>La falla correspondía a una condición básica: lámpara, soquete, CB o contacto simple. No es necesario continuar con diagnóstico profundo.</p>
</div>
<div class="btn-row">
<button onclick="restartApp()">Nuevo caso</button>
</div>
`;
}

function handleImageUpload(event, type) {
const file = event.target.files[0];
if (!file) return;

const url = URL.createObjectURL(file);

if (type === 'op') {
state.opImageUrl = url;
state.opFileName = file.name;
} else {
state.wdmImageUrl = url;
state.wdmFileName = file.name;
}

render();
}

async function runOCR(type) {
let imageUrl = "";
let statusId = "";
let targetId = "";
let label = "";

if (type === 'op') {
imageUrl = state.opImageUrl;
statusId = "opStatus";
targetId = "opInput";
label = "principio de operación";
} else {
imageUrl = state.wdmImageUrl;
statusId = "wdmStatus";
targetId = "wdmInput";
label = "WDM";
}

if (!imageUrl) {
alert(`Primero debes cargar una imagen para ${label}.`);
return;
}

const statusEl = document.getElementById(statusId);
if (statusEl) statusEl.innerHTML = "Procesando OCR... esto puede tardar unos segundos.";

try {
const result = await Tesseract.recognize(
imageUrl,
'eng',
{
logger: m => {
if (statusEl && m.status) {
const progress = m.progress ? ` (${Math.round(m.progress * 100)}%)` : "";
statusEl.innerHTML = `${m.status}${progress}`;
}
}
}
);

const text = (result.data.text || "").trim();

if (type === 'op') {
state.opOCRText = text;
state.opText = text;
} else {
state.wdmOCRText = text;
state.wdmText = text;
}

render();

const target = document.getElementById(targetId);
if (target) target.value = text;

const refreshedStatusEl = document.getElementById(statusId);
if (refreshedStatusEl) {
refreshedStatusEl.innerHTML = text
? "OCR completado. Revisa y corrige el texto antes de analizar."
: "OCR completado, pero no se extrajo texto útil. Prueba con una imagen más clara.";
}
} catch (error) {
console.error(error);
const refreshedStatusEl = document.getElementById(statusId);
if (refreshedStatusEl) {
refreshedStatusEl.innerHTML = "Error al procesar OCR.";
}
alert("No fue posible procesar la imagen. Prueba con una captura más clara.");
}
}

function analyzeDocs() {
const op = document.getElementById("opInput").value.trim();
const wdm = document.getElementById("wdmInput").value.trim();

if (!op || !wdm) {
alert("Debes ingresar el principio de operación y el texto relevante del WDM.");
return;
}

state.opText = op;
state.wdmText = wdm;

const parsed = parseDocs(op, wdm);
state.signalType = parsed.signalType;
state.contactState = parsed.contactState;
state.logicSummary = parsed.logicSummary;
state.expectedMeasurement = parsed.expectedMeasurement;

step = 4;
render();
}

function mechanicalStop() {
const app = document.getElementById("app");
app.innerHTML = `
<h2 class="section-title">WARNING</h2>
<div class="warning-box">
<strong>Condición no normal</strong>
<p>Si el componente generador de señal no está siendo accionado correctamente, no debes continuar el diagnóstico eléctrico usando ese punto como referencia válida.</p>
</div>
<ul>
<li>Verifica rigging</li>
<li>Revisa ajuste mecánico</li>
<li>Confirma por qué el componente dejó de actuar</li>
</ul>
<div class="btn-row">
<button onclick="restartApp()">Nuevo caso</button>
</div>
`;
}

function measurementPass() {
step = 7;
render();
}

function measurementFail() {
step = 8;
render();
}

function restartApp() {
step = 0;
state.faultText = "";
state.detectedSystem = "";
state.detectedATA = "";
state.clarifiedCondition = "";
state.opText = "";
state.wdmText = "";
state.signalType = "";
state.contactState = "";
state.logicSummary = "";
state.expectedMeasurement = "";
state.opImageUrl = "";
state.wdmImageUrl = "";
state.opFileName = "";
state.wdmFileName = "";
state.opOCRText = "";
state.wdmOCRText = "";
render();
}

render();
</script>

</body>
</html>
