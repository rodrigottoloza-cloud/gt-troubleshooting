<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G&T Troubleshooting</title>

<style>
body{
font-family: Arial;
background:#eef2f7;
margin:0;
}

/* PORTADA */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1517479149777-5f3b1511d5ad?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
text-align:center;
}

.hero h1{
font-size:40px;
}

button{
padding:14px 25px;
border:none;
border-radius:10px;
background:#2c67b8;
color:white;
cursor:pointer;
font-weight:bold;
}

/* LOGIN */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:12px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

/* APP */
.app{
display:none;
padding:20px;
}

.chat{
border:1px solid #ccc;
height:300px;
overflow:auto;
padding:10px;
background:white;
}

.msg{
margin:10px 0;
}

.user{
text-align:right;
}

.bot{
text-align:left;
}

/* BOTONES DECISION */
.quick{
margin-top:10px;
}

.quick button{
margin:5px;
background:#eee;
color:black;
}

</style>
</head>

<body>

<!-- PORTADA -->
<div class="hero">
<h1>G&T Aircraft Troubleshooting</h1>
<p>Sistema de diagnóstico aeronáutico</p>
<button onclick="openLogin()">Start Diagnostic</button>
</div>

<!-- LOGIN -->
<div class="modal" id="login">
<div class="modal-box">
<h3>Ingreso</h3>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div class="app" id="app">

<h2>Diagnóstico</h2>

<input id="aircraft" placeholder="Modelo aeronave">
<input id="fault" placeholder="Falla">

<button onclick="start()">Ejecutar diagnóstico</button>

<h3>Chat G&T</h3>

<div class="chat" id="chat"></div>

<input id="input" placeholder="Escribe aquí">
<button onclick="send()">Enviar</button>

<div class="quick">
<button onclick="quick('sí')">Sí</button>
<button onclick="quick('no')">No</button>
<button onclick="quick('tengo voltaje')">Voltaje</button>
<button onclick="quick('no tengo voltaje')">No voltaje</button>
<button onclick="quick('continuidad ok')">Continuidad</button>
<button onclick="quick('sin continuidad')">Sin continuidad</button>
<button onclick="quick('siguiente paso')">Siguiente</button>
</div>

</div>

<script>

function openLogin(){
document.getElementById("login").style.display="flex"
}

function login(){
let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="Rodrigo" && p==="1234"){
document.getElementById("login").style.display="none"
document.querySelector(".hero").style.display="none"
document.getElementById("app").style.display="block"
}else{
alert("Datos incorrectos")
}
}

function start(){
addBot("Perfecto Rodrigo. Vamos al grano.\n\nPrimero:\n¿Tienes voltaje en el circuito?")
}

function send(){
let val=document.getElementById("input").value
addUser(val)
process(val)
document.getElementById("input").value=""
}

function quick(txt){
addUser(txt)
process(txt)
}

function addUser(t){
let div=document.createElement("div")
div.className="msg user"
div.innerText=t
chat.appendChild(div)
}

function addBot(t){
let div=document.createElement("div")
div.className="msg bot"
div.innerText=t
chat.appendChild(div)
}

function process(t){

t=t.toLowerCase()

if(t.includes("no voltaje")){
addBot("Ok. Dirígete al breaker correspondiente y verifica alimentación.")
}
else if(t.includes("voltaje")){
addBot("Perfecto. Ahora mide continuidad desde el switch.")
}
else if(t.includes("sin continuidad")){
addBot("Falla en cableado o switch. Revisa conector.")
}
else if(t.includes("continuidad")){
addBot("Entonces el problema puede ser indicación o lámpara.")
}
else if(t.includes("siguiente")){
addBot("Vamos al siguiente paso. ¿Qué observas ahora?")
}
else{
addBot("Entendido. Sigue contándome qué ves.")
}
}

</script>

</body>
</html>
