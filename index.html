<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G&T Aircraft Troubleshooting</title>

<style>
body {
margin:0;
font-family: Arial, sans-serif;
background:#e9edf3;
}

/* HERO */
.hero {
height:100vh;
background:url('https://images.unsplash.com/photo-1517479149777-5f3b1511d5ad?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-align:center;
}

.hero h1{
font-size:40px;
margin-bottom:20px;
}

.hero button{
padding:15px 40px;
font-size:18px;
border:none;
border-radius:10px;
background:#2c67b8;
color:white;
cursor:pointer;
}

/* MODAL */
.overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal{
background:white;
width:90%;
max-width:600px;
border-radius:10px;
padding:20px;
}

.modal h2{
margin-bottom:15px;
}

.modal select, .modal textarea{
width:100%;
padding:10px;
margin-top:10px;
}

.result{
margin-top:15px;
background:#f1f5fb;
padding:15px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="hero">
<h1>Aircraft Diagnostic System</h1>
<button onclick="openDiagnostic()">START DIAGNOSTIC</button>
</div>

<div class="overlay" id="modal">
<div class="modal">
<h2>ATA 32 - Landing Gear</h2>

<label>Fault Type</label>
<select id="fault">
<option value="lh">LH green light off</option>
<option value="rh">RH green light off</option>
<option value="all">All lights fail</option>
</select>

<label>Lamp test OK?</label>
<select id="lamp">
<option value="yes">Yes</option>
<option value="no">No</option>
</select>

<label>Descripción</label>
<textarea id="desc">Gear down pero sin luz verde</textarea>

<button onclick="runDiag()">Run Diagnostic</button>
<button onclick="closeDiagnostic()">Cerrar</button>

<div class="result" id="result"></div>
</div>
</div>

<script>
function openDiagnostic(){
document.getElementById("modal").style.display="flex";
}

function closeDiagnostic(){
document.getElementById("modal").style.display="none";
}

function runDiag(){
let fault = document.getElementById("fault").value;
let lamp = document.getElementById("lamp").value;
let result = document.getElementById("result");

let text = "";

if(lamp === "no"){
text = "Primero debes realizar el lamp test. No continúes troubleshooting aún.";
} else {
if(fault === "lh"){
text = "Revisar microswitch LH, continuidad y cableado.";
} else if(fault === "rh"){
text = "Revisar microswitch RH y conexión.";
} else {
text = "Falla general: revisar alimentación común y panel.";
}
}

result.style.display="block";
result.innerHTML = text;
}
</script>

</body>
</html>
